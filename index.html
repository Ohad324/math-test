<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אימון חשבון – כיתה ה'</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0e17;
            --card: #16213e;
            --accent: #f9c74f;
            --accent2: #90be6d;
            --accent3: #f94144;
            --purple: #a78bfa;
            --text: #fffffe;
            --muted: #a7a9be;
            --radius: 20px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { background: #0f0e17 !important; color: #fffffe !important; }
        body {
            font-family: 'Rubik', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(1px 1px at 15% 20%, rgba(249,199,79,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 40% 60%, rgba(167,139,250,0.3) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 70% 10%, rgba(144,190,109,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 85% 75%, rgba(249,199,79,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 60% 40%, rgba(249,65,68,0.3) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 90% 30%, rgba(249,199,79,0.35) 0%, transparent 100%);
            pointer-events: none;
            z-index: 0;
        }

        /* ===== FRACTION STYLES ===== */
        .frac {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            vertical-align: middle;
            margin: 0 10px;
            font-size: 0.95em;
            line-height: 1;
        }
        .frac .num { border-bottom: 2.5px solid currentColor; padding: 0 5px 2px; font-weight: 800; min-width: 18px; text-align: center; }
        .frac .den { padding: 2px 5px 0; font-weight: 800; min-width: 18px; text-align: center; }
        .mixed { direction: ltr; display: inline-flex; align-items: center; gap: 2px; vertical-align: middle; unicode-bidi: isolate; padding: 2px 6px; background: rgba(255,255,255,0.04); border-radius: 7px; }
        .mixed .whole { font-weight: 800; padding-right: 2px; }

        /* ===== LAYOUT ===== */
        .header { width: 100%; max-width: 480px; text-align: center; margin-bottom: 16px; position: relative; z-index: 1; }
        .header-title { font-family: 'Fredoka One', cursive; font-size: 1.9rem; color: var(--accent); text-shadow: 0 0 24px rgba(249,199,79,0.4); }
        .header-sub { font-size: 0.82rem; color: var(--muted); margin-top: 4px; }
        .timer-display { font-family: 'Fredoka One', cursive; font-size: 1.6rem; color: var(--accent2); margin-top: 6px; letter-spacing: 1px; }
        .timer-display.warn { color: var(--accent); }
        .timer-display.danger { color: var(--accent3); animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

        .header { position: relative; }
        #lives-display { position: absolute; top: 0; left: 0; display: flex; gap: 6px; font-size: 1.5rem; line-height: 1; }
        .life { transition: all 0.4s ease; display: inline-block; position: relative; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4)); }
        .life.lost { filter: grayscale(1); opacity: 0.35; transform: scale(0.85); }
        .life.lost::after { content: "✖"; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--accent3); font-weight: 900; font-size: 1.4rem; text-shadow: 0 0 4px #000; }
        #score-display { position: absolute; top: 36px; left: 0; font-family: 'Fredoka One', cursive; color: var(--accent); font-size: 1.15rem; background: rgba(249,199,79,0.12); padding: 3px 12px; border-radius: 100px; border: 1px solid rgba(249,199,79,0.3); }
        @keyframes scoreBump { 0%{transform:scale(1)} 30%{transform:scale(1.25);color:var(--accent2)} 100%{transform:scale(1);color:var(--accent)} }
        #score-display.bump { animation: scoreBump 0.5s ease; }
        .player-tag { font-size: 0.8rem; color: var(--muted); margin-top: 6px; display: inline-flex; align-items: center; gap: 6px; }
        .player-tag #player-name { color: var(--accent); font-weight: 700; }
        .player-tag button { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: var(--text); border-radius: 6px; padding: 2px 8px; font-size: 0.72rem; cursor: pointer; font-family: inherit; }
        .player-tag button:hover { background: rgba(255,255,255,0.15); }

        /* Round indicator */
        .round-indicator {
            width: 100%;
            max-width: 480px;
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }
        .round-pip {
            flex: 1;
            height: 6px;
            border-radius: 100px;
            background: rgba(255,255,255,0.1);
            transition: background 0.4s;
        }
        .round-pip.done { background: var(--accent2); }
        .round-pip.active { background: var(--purple); box-shadow: 0 0 8px rgba(167,139,250,0.6); }

        .progress-area { width: 100%; max-width: 480px; margin-bottom: 14px; position: relative; z-index: 1; }
        .progress-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
        .pill { font-size: 0.78rem; font-weight: 700; padding: 4px 12px; border-radius: 100px; }
        .pill-q { background: rgba(167,139,250,0.15); color: var(--purple); border: 1px solid rgba(167,139,250,0.3); }
        .pill-s { background: rgba(144,190,109,0.15); color: var(--accent2); border: 1px solid rgba(144,190,109,0.3); }
        .pill-r { background: rgba(249,199,79,0.15); color: var(--accent); border: 1px solid rgba(249,199,79,0.3); }
        .progress-track { width: 100%; height: 5px; background: rgba(255,255,255,0.08); border-radius: 100px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--purple), var(--accent)); border-radius: 100px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); box-shadow: 0 0 10px rgba(167,139,250,0.5); }

        #quiz-container { width: 100%; max-width: 480px; position: relative; z-index: 1; }

        .question-card { background: var(--card); border: 1px solid rgba(255,255,255,0.07); border-radius: var(--radius); padding: 22px 18px; margin-bottom: 14px; position: relative; overflow: hidden; }
        .question-card::before { content: ''; position: absolute; top: -40px; left: -40px; width: 120px; height: 120px; background: radial-gradient(circle, rgba(167,139,250,0.12) 0%, transparent 70%); pointer-events: none; }

        .topic-badge { display: inline-block; font-size: 0.68rem; font-weight: 700; padding: 3px 10px; border-radius: 100px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .topic-fractions  { background: rgba(249,199,79,0.1);  color: var(--accent);  border: 1px solid rgba(249,199,79,0.25); }
        .topic-add        { background: rgba(144,190,109,0.1); color: var(--accent2); border: 1px solid rgba(144,190,109,0.25); }
        .topic-sub        { background: rgba(249,65,68,0.1);   color: #ff8080;        border: 1px solid rgba(249,65,68,0.25); }
        .topic-lcd        { background: rgba(167,139,250,0.1); color: var(--purple);  border: 1px solid rgba(167,139,250,0.25); }
        .topic-number-line{ background: rgba(167,139,250,0.1); color: var(--purple);  border: 1px solid rgba(167,139,250,0.25); }
        .topic-decimals   { background: rgba(144,190,109,0.1); color: var(--accent2); border: 1px solid rgba(144,190,109,0.25); }
        .topic-geometry   { background: rgba(249,199,79,0.1);  color: var(--accent);  border: 1px solid rgba(249,199,79,0.25); }

        #question-text { font-size: 1.15rem; font-weight: 700; line-height: 2; color: var(--text); }

        .options-grid { display: flex; flex-direction: column; gap: 9px; margin-bottom: 14px; }
        .option-btn {
            width: 100%; background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.1);
            border-radius: 13px; padding: 13px 16px; color: var(--text); font-family: 'Rubik', sans-serif;
            font-size: 1rem; font-weight: 500; text-align: right; cursor: pointer;
            transition: all 0.18s ease; display: flex; align-items: center; gap: 11px; line-height: 2;
        }
        @media (hover: hover) {
            .option-btn:hover:not(:disabled) { background: rgba(167,139,250,0.1); border-color: rgba(167,139,250,0.4); transform: translateX(-3px); }
        }
        .option-btn { -webkit-tap-highlight-color: transparent; }
        .option-btn:focus, .option-btn:focus-visible { outline: none; box-shadow: none; }
        .option-btn { -webkit-tap-highlight-color: transparent; }
        .option-btn .opt-letter { min-width: 28px; height: 28px; border-radius: 7px; background: rgba(255,255,255,0.07); display: flex; align-items: center; justify-content: center; font-size: 0.78rem; font-weight: 800; color: var(--muted); flex-shrink: 0; }
        .option-btn.correct { background: rgba(144,190,109,0.15); border-color: var(--accent2); animation: pulse-green 0.4s ease; }
        .option-btn.correct .opt-letter { background: var(--accent2); color: var(--bg); }
        .option-btn.wrong { background: rgba(249,65,68,0.12); border-color: var(--accent3); }
        .option-btn.wrong .opt-letter { background: var(--accent3); color: white; }
        .option-btn.dimmed { opacity: 0.35; }

        @keyframes pulse-green { 0%{transform:scale(1)} 50%{transform:scale(1.02)} 100%{transform:scale(1)} }

        .feedback-banner { border-radius: 12px; padding: 11px 15px; font-size: 0.92rem; font-weight: 700; margin-bottom: 12px; display: none; align-items: center; gap: 10px; line-height: 1.8; }
        .feedback-banner.show { display: flex; }
        .feedback-banner.correct-fb { background: rgba(144,190,109,0.15); border: 1px solid rgba(144,190,109,0.3); color: var(--accent2); }
        .feedback-banner.wrong-fb   { background: rgba(249,65,68,0.12);   border: 1px solid rgba(249,65,68,0.3);   color: #ff8080; }

        /* Explanation panel (shown after wrong answer when explain exists) */
        #explain-panel { display: none; background: rgba(167,139,250,0.08); border: 1px solid rgba(167,139,250,0.3); border-radius: 14px; padding: 14px 16px; margin-bottom: 12px; color: var(--text); }
        #explain-panel.show { display: block; animation: fadeSlideIn 0.3s ease forwards; }
        #explain-panel .exp-title { font-weight: 800; font-size: 1rem; color: var(--purple); margin-bottom: 8px; }
        #explain-panel .exp-body { font-size: 0.92rem; line-height: 1.7; }
        #explain-panel .exp-step { color: var(--muted); margin-bottom: 10px; }
        #explain-panel .exp-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; flex-wrap: wrap; direction: ltr; justify-content: flex-end; }
        #explain-panel .exp-label { font-weight: 700; color: var(--accent); min-width: 95px; direction: rtl; }
        #explain-panel .exp-cells { display: inline-flex; gap: 4px; flex-wrap: wrap; direction: ltr; }
        #explain-panel .exp-cell { background: rgba(255,255,255,0.06); padding: 3px 9px; border-radius: 6px; font-weight: 700; font-family: 'Fredoka One', cursive; min-width: 26px; text-align: center; }
        #explain-panel .exp-cell.exp-match { background: var(--accent2); color: var(--bg); box-shadow: 0 0 10px rgba(144,190,109,0.5); }
        #explain-panel .exp-result { margin-top: 10px; padding-top: 10px; border-top: 1px dashed rgba(255,255,255,0.15); font-weight: 700; font-size: 1rem; text-align: center; }
        #explain-panel .exp-result b { color: var(--accent2); font-size: 1.2rem; font-family: 'Fredoka One', cursive; }
        #explain-panel .exp-eq { direction: ltr; text-align: center; margin: 8px 0; padding: 8px 6px; background: rgba(255,255,255,0.04); border-radius: 8px; font-size: 1.02rem; line-height: 2.2; }
        #explain-panel .exp-answer { color: var(--accent2); font-weight: 800; padding: 0 4px; }
        #explain-panel .frac.exp-answer { color: var(--accent2); }
        #explain-panel .frac.exp-answer .num, #explain-panel .frac.exp-answer .den { color: var(--accent2); }

        /* Mistakes review on final screen */
        #mistakes-review { display: flex; flex-direction: column; gap: 10px; margin: 14px 0; }
        .mistake-card { background: rgba(249,65,68,0.08); border: 1px solid rgba(249,65,68,0.25); border-radius: 12px; padding: 12px 14px; }
        .mistake-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 0.85rem; color: var(--muted); }
        .mistake-qnum { font-weight: 800; color: var(--accent3); }
        .mistake-q { font-size: 0.98rem; font-weight: 700; margin-bottom: 8px; color: var(--text); }
        .mistake-row { display: flex; gap: 10px; align-items: center; font-size: 0.88rem; margin: 4px 0; flex-wrap: wrap; }
        .mistake-row .lbl { color: var(--muted); min-width: 60px; }
        .mistake-row .chosen { color: var(--accent3); font-weight: 700; }
        .mistake-row .correct { color: var(--accent2); font-weight: 700; }
        .mistake-explain-toggle { background: rgba(167,139,250,0.15); border: 1px solid rgba(167,139,250,0.3); color: var(--purple); border-radius: 8px; padding: 5px 10px; font-size: 0.8rem; cursor: pointer; font-family: inherit; margin-top: 6px; }
        .mistake-explain-toggle:hover { background: rgba(167,139,250,0.25); }
        .mistake-explain { display: none; margin-top: 8px; padding: 10px; background: rgba(167,139,250,0.05); border-radius: 8px; }
        .mistake-explain.show { display: block; }
        .mistakes-empty { text-align: center; color: var(--accent2); font-weight: 700; padding: 12px; }

        #next-btn { width: 100%; background: linear-gradient(135deg, var(--purple), #7c3aed); border: none; border-radius: 13px; padding: 15px; color: white; font-family: 'Rubik', sans-serif; font-size: 0.98rem; font-weight: 700; cursor: pointer; transition: all 0.2s; display: none; box-shadow: 0 6px 24px rgba(124,58,237,0.35); }
        #next-btn:hover { transform: translateY(-2px); }
        #next-btn.show { display: block; }

        /* ===== ROUND COMPLETE SCREEN ===== */
        #round-container { display: none; width: 100%; max-width: 480px; position: relative; z-index: 1; flex-direction: column; gap: 14px; }
        #round-container.show { display: flex; }

        .round-hero { background: var(--card); border: 1px solid rgba(255,255,255,0.07); border-radius: var(--radius); padding: 28px 22px; text-align: center; }
        .round-emoji { font-size: 3.5rem; display: block; margin-bottom: 10px; }
        .round-title { font-family: 'Fredoka One', cursive; font-size: 1.7rem; color: var(--accent); margin-bottom: 6px; }
        .round-sub { color: var(--muted); font-size: 0.88rem; }

        .round-score-box { background: linear-gradient(135deg, rgba(249,199,79,0.1), rgba(167,139,250,0.1)); border: 1px solid rgba(249,199,79,0.2); border-radius: var(--radius); padding: 18px; text-align: center; }
        .round-score-num { font-family: 'Fredoka One', cursive; font-size: 3rem; background: linear-gradient(135deg, var(--accent), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; }
        .round-score-lbl { color: var(--muted); font-size: 0.82rem; margin-top: 4px; }

        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-card { background: var(--card); border: 1px solid rgba(255,255,255,0.07); border-radius: 13px; padding: 14px; text-align: center; }
        .stat-val { font-family: 'Fredoka One', cursive; font-size: 1.7rem; }
        .stat-val.green { color: var(--accent2); }
        .stat-val.red   { color: var(--accent3); }
        .stat-lbl { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

        .whatsapp-btn { width: 100%; background: linear-gradient(135deg, #25d366, #128c7e); border: none; border-radius: 13px; padding: 16px; color: white; font-family: 'Rubik', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 6px 24px rgba(37,211,102,0.3); }
        .whatsapp-btn:hover { transform: translateY(-2px); }

        .continue-btn { width: 100%; background: linear-gradient(135deg, var(--accent), #f97316); border: none; border-radius: 13px; padding: 16px; color: #1a1a2e; font-family: 'Rubik', sans-serif; font-size: 1rem; font-weight: 800; cursor: pointer; transition: all 0.2s; box-shadow: 0 6px 24px rgba(249,199,79,0.3); }
        .continue-btn:hover { transform: translateY(-2px); }

        /* ===== FINAL SCREEN ===== */
        #final-container { display: none; width: 100%; max-width: 480px; position: relative; z-index: 1; flex-direction: column; gap: 14px; }
        #final-container.show { display: flex; }

        .footer { color: var(--muted); font-size: 0.73rem; margin-top: 18px; margin-bottom: 8px; text-align: center; position: relative; z-index: 1; }

        @keyframes fadeSlideIn { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
        .question-card, .options-grid { animation: fadeSlideIn 0.3s ease forwards; }

        /* ===== Admin sidebar (visible only when body.admin-mode) ===== */
        #admin-sidebar { display: none; }
        body.admin-mode #admin-sidebar {
            display: block;
            position: fixed; top: 12px; left: 12px; bottom: 12px;
            width: 200px; z-index: 1000;
            background: rgba(22,33,62,0.95);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            padding: 12px 10px;
            overflow-y: auto;
            direction: ltr;
            font-family: 'Rubik', sans-serif;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        body.admin-mode { padding-left: 224px; }
        .adm-title { font-weight: 700; color: var(--accent); text-align: center; font-size: 0.85rem; margin-bottom: 10px; direction: rtl; }
        .adm-section { margin-bottom: 12px; }
        .adm-section-h { color: var(--purple); font-weight: 700; font-size: 0.85rem; margin-bottom: 5px; letter-spacing: 0.5px; }
        .adm-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .adm-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: var(--text); border-radius: 6px; padding: 5px 0; font-size: 0.75rem; cursor: pointer; font-family: inherit; transition: background 0.15s, transform 0.1s; }
        .adm-btn:hover { background: var(--accent); color: #000; transform: scale(1.05); }
        .adm-btn.active { background: var(--accent2); color: #000; font-weight: 700; }
        #adm-exit { width: 100%; margin-top: 8px; background: rgba(249,65,68,0.18); border: 1px solid rgba(249,65,68,0.4); color: var(--text); border-radius: 8px; padding: 6px; font-size: 0.75rem; cursor: pointer; font-family: inherit; direction: rtl; }
        #adm-exit:hover { background: rgba(249,65,68,0.35); }
        @media (max-width: 720px) { body.admin-mode { padding-left: 16px; } body.admin-mode #admin-sidebar { width: 160px; } }
    </style>
</head>
<body>

<!-- Admin sidebar (hidden unless ?admin=1) -->
<aside id="admin-sidebar" aria-hidden="true">
    <div class="adm-title">🛠️ Admin · קפיצה לשאלה</div>
    <div id="adm-sections"></div>
    <button id="adm-exit" type="button">יציאה ממצב אדמין</button>
</aside>

<div class="header">
    <div class="header-title">🔢 חשבון כיתה ה'</div>
    <div class="timer-display" id="timer-display" style="display:none">⏱ 10:00</div>
    <div class="player-tag" id="player-tag">שחקן: <span id="player-name">…</span> <button id="player-change" type="button">שנה</button></div>
    <div id="lives-display">
        <span class="life" data-i="0">❤️</span>
        <span class="life" data-i="1">❤️</span>
        <span class="life" data-i="2">❤️</span>
    </div>
    <div id="score-display">⭐ <span id="score-value">0</span></div>
</div>

<div class="progress-area" id="progress-area">
    <div class="progress-meta">
        <span class="pill pill-q" id="progress-text">שאלה 1</span>
        <span class="pill pill-s" id="score-text" style="display:none">✓ 0</span>
    </div>
    <div class="progress-track">
        <div class="progress-fill" id="progress-bar" style="width: 1%"></div>
    </div>
</div>

<!-- Quiz -->
<div id="quiz-container">
    <div class="question-card">
        <span class="topic-badge topic-fractions" id="topic-badge">שברים</span>
        <div id="question-text">טוען שאלה...</div>
    </div>
    <div class="options-grid" id="options-container"></div>
    <div class="feedback-banner" id="feedback-banner">
        <span id="feedback-icon">✅</span>
        <span id="feedback-text">כל הכבוד!</span>
    </div>
    <div id="explain-panel"></div>
    <button id="next-btn">המשך ←</button>
</div>

<!-- Round complete -->
<div id="round-container">
    <div class="round-hero">
        <span class="round-emoji" id="round-emoji">🎉</span>
        <div class="round-title" id="round-title">סיימת סבב!</div>
        <div class="round-sub" id="round-sub">סבב 1 מתוך 5</div>
    </div>
    <div class="round-score-box">
        <div class="round-score-num" id="round-score-num">0/20</div>
        <div class="round-score-lbl" id="round-score-lbl">0% תשובות נכונות בסבב זה</div>
    </div>
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-val green" id="round-correct">0</div>
            <div class="stat-lbl">נכונות ✅</div>
        </div>
        <div class="stat-card">
            <div class="stat-val red" id="round-wrong">0</div>
            <div class="stat-lbl">שגויות ❌</div>
        </div>
    </div>
    <button class="whatsapp-btn" id="round-whatsapp-btn">

<script>
const PARENT_PHONE = "972542584032";
// ntfy.sh push notification topic — keep this secret-ish; anyone with the name can subscribe
const NTFY_TOPIC   = "ohad-math-3xj9k7q2v8t5";

// Identify which device/child sent the notification — only stored if user explicitly enters it
function getPlayerName(){
    const name = (localStorage.getItem("mt_player") || "").trim();
    // Treat legacy placeholder "לא ידוע" as unset
    if (!name || name === "לא ידוע") return "";
    return name;
}
function renderPlayerTag(){
    const tag = document.getElementById("player-tag");
    const nameEl = document.getElementById("player-name");
    const btn = document.getElementById("player-change");
    if (!tag || !nameEl || !btn) return;
    const name = getPlayerName();
    if (name) {
        tag.firstChild.nodeValue = "שחקן: ";
        nameEl.textContent = name;
        nameEl.style.display = "";
        btn.textContent = "שנה";
    } else {
        tag.firstChild.nodeValue = "";
        nameEl.textContent = "";
        nameEl.style.display = "none";
        btn.textContent = "👤 הזן שם";
    }
}
function changePlayerName(){
    const cur  = getPlayerName();
    const next = (prompt("שם:", cur) || "").trim();
    if (next) {
        localStorage.setItem("mt_player", next);
    } else if (next === "") {
        // User cleared the field — remove the stored name
        localStorage.removeItem("mt_player");
    }
    renderPlayerTag();
}

// Convert math HTML (with .frac / .mixed spans) to a plain-text exercise string
function plainText(html){
    const div = document.createElement("div");
    div.innerHTML = html;
    div.querySelectorAll(".mixed").forEach(el => {
        const whole = el.querySelector(".whole")?.textContent || "";
        const fr    = el.querySelector(".frac");
        const num   = fr?.querySelector(".num")?.textContent || "";
        const den   = fr?.querySelector(".den")?.textContent || "";
        el.replaceWith(`${whole} ${num}/${den}`);
    });
    div.querySelectorAll(".frac").forEach(fr => {
        const num = fr.querySelector(".num")?.textContent || "";
        const den = fr.querySelector(".den")?.textContent || "";
        fr.replaceWith(`${num}/${den}`);
    });
    return div.textContent.replace(/\s+/g, " ").trim();
}
const ROUND_SIZE = 20;

// ── Fraction helpers ──────────────────────────────────────────────
function f(n, d) { return `<span class="frac"><span class="num">${n}</span><span class="den">${d}</span></span>`; }
function m(w, n, d) { return `<span class="mixed"><span class="whole">${w}</span>${f(n,d)}</span>`; }

// ── Math helpers (for explanations) ────────────────────────────────
function gcd(a, b){ return b === 0 ? Math.abs(a) : gcd(b, a % b); }
function lcm(a, b){ return Math.abs(a * b) / gcd(a, b); }
function lcmAll(nums){ return nums.reduce((acc, n) => lcm(acc, n)); }

// SVG number line — start..end with subdivisions, marker at position `pos` (fractional 0..1 of range), label `posLabel`
function numberLineSVG({start, end, divisions, marker, markerLabel, extraTicks = []}){
    const W = 320, H = 90;
    const padX = 24;
    const y = 55;
    const x0 = padX, x1 = W - padX;
    const range = end - start;
    const xAt = v => x0 + ((v - start) / range) * (x1 - x0);

    // Main axis
    let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:340px;display:block;margin:8px auto;">`;
    svg += `<line x1="${x0}" y1="${y}" x2="${x1}" y2="${y}" stroke="#fffffe" stroke-width="2"/>`;
    // Arrow heads
    svg += `<polygon points="${x1},${y} ${x1-6},${y-4} ${x1-6},${y+4}" fill="#fffffe"/>`;
    svg += `<polygon points="${x0},${y} ${x0+6},${y-4} ${x0+6},${y+4}" fill="#fffffe"/>`;

    // Integer ticks + labels
    for (let v = start; v <= end; v++) {
        const x = xAt(v);
        svg += `<line x1="${x}" y1="${y-7}" x2="${x}" y2="${y+7}" stroke="#fffffe" stroke-width="2"/>`;
        svg += `<text x="${x}" y="${y+22}" fill="#a7a9be" font-size="13" font-weight="700" text-anchor="middle" font-family="Rubik,sans-serif">${v}</text>`;
    }

    // Subdivisions within each integer interval (small ticks)
    if (divisions && divisions > 1) {
        for (let v = start; v < end; v++) {
            for (let k = 1; k < divisions; k++) {
                const x = xAt(v + k / divisions);
                svg += `<line x1="${x}" y1="${y-4}" x2="${x}" y2="${y+4}" stroke="#a7a9be" stroke-width="1"/>`;
            }
        }
    }

    // Extra labeled ticks (e.g. 1/4, 2/4, 3/4 labels)
    extraTicks.forEach(t => {
        const x = xAt(t.value);
        svg += `<text x="${x}" y="${y-12}" fill="#a78bfa" font-size="11" font-weight="700" text-anchor="middle" font-family="Rubik,sans-serif">${t.label}</text>`;
    });

    // Marker (green dot + label)
    if (marker !== undefined) {
        const mx = xAt(marker);
        svg += `<circle cx="${mx}" cy="${y}" r="7" fill="#90be6d" stroke="#fffffe" stroke-width="2"/>`;
        if (markerLabel) {
            svg += `<text x="${mx}" y="${y-16}" fill="#90be6d" font-size="14" font-weight="800" text-anchor="middle" font-family="Fredoka One,cursive">${markerLabel}</text>`;
        }
    }

    svg += `</svg>`;
    return svg;
}

function mkExplain(title, bodyHtml){
    return `<div class="exp-title">🧠 ${title}</div><div class="exp-body">${bodyHtml}</div>`;
}

// Render an inline fraction with optional color hint
function frac(n, d, cls=""){
    return `<span class="frac ${cls}"><span class="num">${n}</span><span class="den">${d}</span></span>`;
}
function mixedHtml(w, n, d){
    return `<span class="mixed"><span class="whole">${w}</span>${frac(n,d)}</span>`;
}
function step(txt){ return `<div class="exp-step">${txt}</div>`; }
function eqLine(html){ return `<div class="exp-eq">${html}</div>`; }

// ── Explanation helpers per topic ─────────────────────────────────

// Simplify n/d to lowest terms by GCD
function simplifyExplain(n, d){
    const g = gcd(n, d);
    const sn = n / g, sd = d / g;
    return mkExplain("איך מצמצמים?",
        step(`מוצאים את המספר הגדול ביותר שמחלק גם את ${n} וגם את ${d} בלי שארית.`) +
        step(`<b>GCD(${n}, ${d}) = ${g}</b>`) +
        step(`מחלקים את שניהם ב-${g}:`) +
        eqLine(`${frac(n,d)} = ${frac(`${n}÷${g}`,`${d}÷${g}`)} = ${frac(sn,sd,"exp-answer")}`)
    );
}

// Expand n/d by factor k → (n*k)/(d*k)
function expandExplain(n, d, k){
    return mkExplain("איך מרחיבים?",
        step(`להרחיב פי ${k} = להכפיל גם את המונה וגם את המכנה ב-${k}.`) +
        eqLine(`${frac(n,d)} = ${frac(`${n}×${k}`,`${d}×${k}`)} = ${frac(n*k, d*k, "exp-answer")}`)
    );
}

// Find equivalent fraction: which option equals n/d?
function equivalentExplain(n, d, eqN, eqD){
    const k = eqN / n;
    return mkExplain("איזה שבר שווה?",
        step(`שני שברים שווים אם מכפילים את המונה והמכנה באותו מספר.`) +
        eqLine(`${frac(n,d)} = ${frac(`${n}×${k}`,`${d}×${k}`)} = ${frac(eqN, eqD, "exp-answer")}`)
    );
}

// Missing numerator: n1/d1 = ?/d2
function missingNumExplain(n1, d1, d2){
    const k = d2 / d1;
    const ans = n1 * k;
    return mkExplain("מציאת מונה חסר",
        step(`כדי להפוך את המכנה מ-${d1} ל-${d2}, מכפילים ב-${k}.`) +
        step(`מכפילים גם את המונה באותו מספר: ${n1} × ${k} = ${ans}`) +
        eqLine(`${frac(n1,d1)} = ${frac(`<span class="exp-answer">${ans}</span>`, d2)}`)
    );
}

// Same-denominator addition
function addSameDenomExplain(n1, n2, d){
    const sum = n1 + n2;
    const g = gcd(sum, d);
    let html = step(`מכנה משותף — מחברים את המונים, המכנה נשאר אותו דבר.`) +
        eqLine(`${frac(n1,d)} + ${frac(n2,d)} = ${frac(`${n1}+${n2}`, d)} = ${frac(sum, d, g>1?"":"exp-answer")}`);
    if (g > 1) html += step(`מצמצמים ב-${g}:`) + eqLine(`${frac(sum,d)} = ${frac(sum/g, d/g, "exp-answer")}`);
    return mkExplain("חיבור שברים", html);
}

function subSameDenomExplain(n1, n2, d){
    const diff = n1 - n2;
    const g = gcd(Math.abs(diff) || 1, d);
    let html = step(`מכנה משותף — מחסרים את המונים, המכנה נשאר אותו דבר.`) +
        eqLine(`${frac(n1,d)} − ${frac(n2,d)} = ${frac(`${n1}−${n2}`, d)} = ${frac(diff, d, g>1?"":"exp-answer")}`);
    if (g > 1) html += step(`מצמצמים ב-${g}:`) + eqLine(`${frac(diff,d)} = ${frac(diff/g, d/g, "exp-answer")}`);
    return mkExplain("חיסור שברים", html);
}

// Different-denominator addition or subtraction
function diffDenomExplain(op, n1, d1, n2, d2){
    const L = lcm(d1, d2);
    const k1 = L / d1, k2 = L / d2;
    const nn1 = n1 * k1, nn2 = n2 * k2;
    const result = op === "+" ? nn1 + nn2 : nn1 - nn2;
    const g = gcd(Math.abs(result) || 1, L);
    let html =
        step(`מכנים שונים — צריך מכנה משותף. <b>LCD(${d1},${d2}) = ${L}</b>.`) +
        step(`מרחיבים כל שבר עד שהמכנה יהיה ${L}:`) +
        eqLine(`${frac(n1,d1)} = ${frac(`${n1}×${k1}`,`${d1}×${k1}`)} = ${frac(nn1, L)}`) +
        eqLine(`${frac(n2,d2)} = ${frac(`${n2}×${k2}`,`${d2}×${k2}`)} = ${frac(nn2, L)}`) +
        step(`עכשיו ${op === "+" ? "מחברים" : "מחסרים"} מונים:`) +
        eqLine(`${frac(nn1,L)} ${op} ${frac(nn2,L)} = ${frac(result, L, g>1?"":"exp-answer")}`);
    if (g > 1) html += step(`מצמצמים ב-${g}:`) + eqLine(`${frac(result,L)} = ${frac(result/g, L/g, "exp-answer")}`);
    return mkExplain(op === "+" ? "חיבור שברים שונים" : "חיסור שברים שונים", html);
}
const addDiffDenomExplain = (n1,d1,n2,d2) => diffDenomExplain("+", n1,d1,n2,d2);
const subDiffDenomExplain = (n1,d1,n2,d2) => diffDenomExplain("−", n1,d1,n2,d2);

// Subtract fraction from 1: 1 − n/d = (d-n)/d
function subFromOneExplain(n, d){
    return mkExplain("חיסור משלם",
        step(`רושמים את ה-1 כשבר עם אותו מכנה: <b>1 = ${frac(d,d)}</b>`) +
        eqLine(`1 − ${frac(n,d)} = ${frac(d,d)} − ${frac(n,d)} = ${frac(`${d}−${n}`, d)} = ${frac(d-n, d, "exp-answer")}`)
    );
}

// Three-fraction add (assumes mixable to LCM of all 3 dens)
function addThreeExplain(n1,d1,n2,d2,n3,d3){
    const L = lcmAll([d1,d2,d3]);
    const k1=L/d1, k2=L/d2, k3=L/d3;
    const nn1=n1*k1, nn2=n2*k2, nn3=n3*k3;
    const sum = nn1+nn2+nn3;
    const g = gcd(sum, L);
    let html =
        step(`מוצאים מכנה משותף לשלושת השברים: <b>LCD(${d1},${d2},${d3}) = ${L}</b>.`) +
        eqLine(`${frac(n1,d1)} = ${frac(nn1,L)}, &nbsp; ${frac(n2,d2)} = ${frac(nn2,L)}, &nbsp; ${frac(n3,d3)} = ${frac(nn3,L)}`) +
        step(`מחברים את המונים:`) +
        eqLine(`${frac(nn1,L)} + ${frac(nn2,L)} + ${frac(nn3,L)} = ${frac(sum, L, g>1?"":"exp-answer")}`);
    if (g > 1) {
        const sg = sum/g, lg = L/g;
        html += step(`מצמצמים ב-${g}:`) + eqLine(`${frac(sum,L)} = ${frac(sg, lg, "exp-answer")}` + (sg === lg ? ` = ${sg}` : ""));
    }
    return mkExplain("חיבור 3 שברים", html);
}

// Improper fraction to mixed: n/d → w + r/d
function improperToMixedExplain(n, d){
    const w = Math.floor(n / d);
    const r = n - w * d;
    return mkExplain("שבר לא אמיתי → מספר מעורב",
        step(`מחלקים את ${n} ב-${d}:`) +
        eqLine(`${n} ÷ ${d} = ${w} ושארית ${r}`) +
        step(`<b>השלם</b> = ${w}, <b>השארית</b> נכנסת למונה:`) +
        eqLine(`${frac(n,d)} = <span class="exp-answer">${mixedHtml(w, r, d)}</span>`)
    );
}

// Mixed to improper: w n/d → (w*d + n)/d
function mixedToImproperExplain(w, n, d){
    const total = w * d + n;
    return mkExplain("מספר מעורב → שבר לא אמיתי",
        step(`מכפילים את השלם במכנה ומוסיפים את המונה:`) +
        eqLine(`${mixedHtml(w,n,d)} = ${frac(`${w}×${d}+${n}`, d)} = ${frac(`${w*d}+${n}`, d)} = ${frac(total, d, "exp-answer")}`)
    );
}

// Fraction → decimal (small d only — 2,4,5,8,10,100,1000)
function fracToDecimalExplain(n, d){
    const decimal = n / d;
    return mkExplain("שבר → עשרוני",
        step(`מחלקים את המונה במכנה:`) +
        eqLine(`${frac(n,d)} = ${n} ÷ ${d} = <span class="exp-answer">${decimal}</span>`)
    );
}

// Decimal → fraction (simN/simD is the expected answer form)
function decimalToFractionExplain(decimalStr, simN, simD){
    const places = (decimalStr.split(".")[1] || "").length;
    const base = Math.pow(10, places);
    const rawN = Math.round(parseFloat(decimalStr) * base);
    const isAlreadyFinal = (rawN === simN && base === simD);
    let html = step(`כל ספרה אחרי הנקודה = חלק חלקי 10, 100, 1000...`) +
        step(`ל-${decimalStr} יש ${places} ספרות אחרי הנקודה → המכנה הוא ${base}:`) +
        eqLine(`${decimalStr} = ${frac(rawN, base, isAlreadyFinal ? "exp-answer" : "")}`);
    if (!isAlreadyFinal) {
        const g = gcd(rawN, base);
        html += step(`מצמצמים ב-${g}:`) + eqLine(`${frac(rawN, base)} = ${frac(simN, simD, "exp-answer")}`);
    }
    return mkExplain("עשרוני → שבר", html);
}

// Mixed number → decimal: w n/d → w + n/d
function mixedToDecimalExplain(w, n, d){
    const decFrac = n / d;
    const total = w + decFrac;
    return mkExplain("מספר מעורב → עשרוני",
        step(`ממירים את החלק השברי לעשרוני, ומוסיפים לשלם:`) +
        eqLine(`${mixedHtml(w,n,d)} = ${w} + ${decFrac} = <span class="exp-answer">${total}</span>`)
    );
}

// Mixed-number add: w1 n1/d1 + w2 n2/d2
function addMixedExplain(w1, n1, d1, w2, n2, d2){
    const L = lcm(d1, d2);
    const k1 = L/d1, k2 = L/d2;
    const nn1 = n1*k1, nn2 = n2*k2;
    const sumNum = nn1 + nn2;
    let extraW = Math.floor(sumNum / L);
    let remNum = sumNum - extraW * L;
    const finalW = w1 + w2 + extraW;
    const g = remNum > 0 ? gcd(remNum, L) : 1;
    let html =
        step(`מחברים את השלמים בנפרד ואת השברים בנפרד.`) +
        step(`שלמים: ${w1} + ${w2} = ${w1+w2}`) +
        step(`שברים: ${frac(n1,d1)} + ${frac(n2,d2)}`);
    if (d1 !== d2) html += step(`LCD(${d1},${d2}) = ${L}`) + eqLine(`${frac(n1,d1)} = ${frac(nn1,L)}, &nbsp; ${frac(n2,d2)} = ${frac(nn2,L)}`);
    html += eqLine(`= ${frac(sumNum, L)}`);
    if (extraW > 0) html += step(`${sumNum}/${L} ≥ 1 → מוציאים ${extraW} שלם:`) + eqLine(`${frac(sumNum,L)} = ${extraW} + ${frac(remNum, L)}`);
    let ansHtml;
    if (remNum === 0) ansHtml = `<span class="exp-answer">${finalW}</span>`;
    else if (g > 1) ansHtml = `<span class="exp-answer">${mixedHtml(finalW, remNum/g, L/g)}</span>`;
    else ansHtml = `<span class="exp-answer">${mixedHtml(finalW, remNum, L)}</span>`;
    html += step(`התשובה הסופית:`) + eqLine(ansHtml);
    return mkExplain("חיבור מספרים מעורבים", html);
}

// Mixed-number sub: w1 n1/d1 − w2 n2/d2 (handles borrowing)
function subMixedExplain(w1, n1, d1, w2, n2, d2){
    const L = lcm(d1, d2);
    const k1 = L/d1, k2 = L/d2;
    let nn1 = n1 * k1, nn2 = n2 * k2;
    let html =
        step(`מחסרים שלם פחות שלם, שבר פחות שבר.`);
    if (d1 !== d2) html += step(`LCD(${d1},${d2}) = ${L}`) + eqLine(`${frac(n1,d1)} = ${frac(nn1,L)}, &nbsp; ${frac(n2,d2)} = ${frac(nn2,L)}`);
    let ww1 = w1, ww2 = w2;
    if (nn1 < nn2) {
        html += step(`${nn1}/${L} קטן מ-${nn2}/${L} → לוקחים 1 מהשלם:`) +
                eqLine(`${ww1} → ${ww1-1}, &nbsp; השבר הופך ל-${frac(nn1 + L, L)}`);
        ww1 -= 1; nn1 += L;
    }
    const wDiff = ww1 - ww2;
    const nDiff = nn1 - nn2;
    const g = nDiff > 0 ? gcd(nDiff, L) : 1;
    html += step(`עכשיו מחסרים:`) +
            eqLine(`שלמים: ${ww1} − ${ww2} = ${wDiff}, &nbsp; שברים: ${frac(nn1,L)} − ${frac(nn2,L)} = ${frac(nDiff, L)}`);
    let ansHtml;
    if (nDiff === 0) ansHtml = `<span class="exp-answer">${wDiff}</span>`;
    else if (g > 1) ansHtml = `<span class="exp-answer">${mixedHtml(wDiff, nDiff/g, L/g)}</span>`;
    else ansHtml = `<span class="exp-answer">${mixedHtml(wDiff, nDiff, L)}</span>`;
    html += step(`התשובה הסופית:`) + eqLine(ansHtml);
    return mkExplain("חיסור מספרים מעורבים", html);
}

// Int minus mixed: int − w n/d
function intMinusMixedExplain(intVal, w, n, d){
    // intVal − (w + n/d)
    // = (intVal − w − 1) + (d−n)/d
    const wDiff = intVal - w - 1;
    const remN = d - n;
    return mkExplain("שלם פחות מעורב",
        step(`רושמים את ${intVal} כ-(${intVal-1}) + ${frac(d,d)} כדי שיהיה אפשר לחסר:`) +
        eqLine(`${intVal} = ${intVal-1} + ${frac(d,d)}`) +
        step(`עכשיו מחסרים:`) +
        eqLine(`${intVal} − ${mixedHtml(w,n,d)} = (${intVal-1}−${w}) + ${frac(d,d)} − ${frac(n,d)} = ${wDiff} + ${frac(remN,d)} = <span class="exp-answer">${mixedHtml(wDiff, remN, d)}</span>`)
    );
}

// LCD step-by-step explanation: list multiples of each number until the first common multiple
function lcdExplain(...nums){
    const result = lcmAll(nums);
    const rows = nums.map(n => {
        const mults = [];
        for (let k = 1; k * n <= result; k++) mults.push(k * n);
        const last = mults[mults.length - 1];
        const cells = mults.map(v =>
            `<span class="exp-cell${v === last ? ' exp-match' : ''}">${v}</span>`
        ).join("");
        return `<div class="exp-row"><span class="exp-label">כפולות של ${n}:</span><span class="exp-cells">${cells}</span></div>`;
    }).join("");
    return `
        <div class="exp-title">🧠 איך פותרים?</div>
        <div class="exp-body">
            <div class="exp-step">סופרים את הכפולות של כל מספר עד שמוצאים מספר שמופיע אצל כולם:</div>
            ${rows}
            <div class="exp-result">המכנה המשותף הקטן ביותר: <b>${result}</b> ✨</div>
        </div>
    `;
}
function gcd(a,b){ return b===0?a:gcd(b,a%b); }
function simplify(n,d){ const g=gcd(Math.abs(n),Math.abs(d)); return [n/g, d/g]; }
function fStr(n,d){ const [sn,sd]=simplify(n,d); return sd===1?`${sn}`:`${sn}/${sd}`; }

const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getCtx(){
    if (!audioCtx) audioCtx = new AudioCtx();
    if (audioCtx.state === "suspended") audioCtx.resume();
    return audioCtx;
}
// iOS / mobile: AudioContext starts suspended until a user gesture. Unlock on first tap.
function unlockAudio(){
    try {
        const ctx = getCtx();
        const o = ctx.createOscillator(), g = ctx.createGain();
        g.gain.value = 0; o.connect(g); g.connect(ctx.destination);
        o.start(0); o.stop(ctx.currentTime + 0.01);
    } catch(e) {}
    document.removeEventListener("touchstart", unlockAudio);
    document.removeEventListener("click", unlockAudio);
}
document.addEventListener("touchstart", unlockAudio, { once: true });
document.addEventListener("click", unlockAudio, { once: true });

// ── State ─────────────────────────────────────────────────────────
const TOTAL          = questions.length;   // 100
const SESSION_SEC    = 600;                // 10 minutes
const GROUP_SIZE     = 10;                 // 10 questions per group → 10 groups (A–J)
const STREAK_TARGET  = 4;                  // 4 correct IN A ROW to advance group
const CORRECT_PAUSE  = 800;                // ms to show ✓ feedback before auto-advance
const GROUP_NAMES    = ["A","B","C","D","E","F","G","H","I","J","K","L","M","N","O","P","Q","R"];

let currentQIdx       = 0;     // question index currently shown
let currentGroupIdx   = 0;     // 0-based group index (0=A, 9=J)
let groupRemaining    = [];    // shuffled unshown question indices in current group
let streak            = 0;     // consecutive correct in current group
let correctCount      = 0;     // total correct answers (incl. repeats)
let wrongCount        = 0;     // total wrong answers
let highestGroupReached = 0;   // 0-based — for end-of-session reporting
let answered          = false;
let currentShuffledOpts    = [];  // displayed options for the current question (shuffled)
let currentShuffledCorrect = 0;   // index of correct option AFTER shuffle
const LIVES_TOTAL     = 3;
const POINTS_PER_CORRECT = 3;
let lives             = LIVES_TOTAL;
let score             = 0;
let mistakes          = []; // [{ qIdx, qHtml, chosenHtml, correctHtml, correctText, explainHtml }]
let timeLeft          = SESSION_SEC;
let timerHandle       = null;
let sessionEnded      = false;

// ── DOM refs ──────────────────────────────────────────────────────
const timerDisplay   = document.getElementById("timer-display");
const progressArea   = document.getElementById("progress-area");
const progressText   = document.getElementById("progress-text");
const scoreText      = document.getElementById("score-text");
const progressBar    = document.getElementById("progress-bar");
const topicBadge     = document.getElementById("topic-badge");
const questionText   = document.getElementById("question-text");
const optionsContainer = document.getElementById("options-container");
const feedbackBanner = document.getElementById("feedback-banner");
const feedbackIcon   = document.getElementById("feedback-icon");
const feedbackText   = document.getElementById("feedback-text");
const explainPanel   = document.getElementById("explain-panel");
const nextBtn        = document.getElementById("next-btn");
const quizContainer  = document.getElementById("quiz-container");
const roundContainer = document.getElementById("round-container");
const finalContainer = document.getElementById("final-container");

// ── Timer ─────────────────────────────────────────────────────────
function fmtTime(s){
    const m = Math.floor(s/60), sec = s%60;
    return `${m}:${sec.toString().padStart(2,"0")}`;
}
function renderTimer(){
    timerDisplay.textContent = `⏱ ${fmtTime(timeLeft)}`;
    timerDisplay.classList.toggle("warn", timeLeft <= 120 && timeLeft > 30);
    timerDisplay.classList.toggle("danger", timeLeft <= 30);
}
function startTimer(){
    renderTimer();
    timerHandle = setInterval(() => {
        timeLeft--;
        renderTimer();
        if (timeLeft <= 0) {
            clearInterval(timerHandle);
            timerHandle = null;
            endSession(true);
        }
    }, 1000);
}
function stopTimer(){ if (timerHandle) { clearInterval(timerHandle); timerHandle = null; } }

// ── Mistakes review on final screen ───────────────────────────────
function renderMistakesReview(){
    const host = document.getElementById("mistakes-review");
    if (!host) return;
    if (mistakes.length === 0) {
        host.innerHTML = `<div class="mistakes-empty">🎉 בלי טעויות! עבודה מושלמת!</div>`;
        return;
    }
    host.innerHTML = `<div style="font-weight:800;color:var(--accent);font-size:1rem;margin-bottom:6px;">📋 חזרה על הטעויות (${mistakes.length}):</div>` +
        mistakes.map((m, i) => `
            <div class="mistake-card">
                <div class="mistake-head"><span class="mistake-qnum">שאלה ${m.qIdx+1}</span></div>
                <div class="mistake-q">${m.qHtml}</div>
                <div class="mistake-row"><span class="lbl">בחרת:</span> <span class="chosen">${m.chosenHtml}</span></div>
                <div class="mistake-row"><span class="lbl">נכון:</span> <span class="correct">${m.correctHtml}</span></div>
                ${m.explainHtml ? `<button type="button" class="mistake-explain-toggle" data-i="${i}">📖 הצג הסבר</button><div class="mistake-explain" id="mistake-explain-${i}">${m.explainHtml}</div>` : ""}
            </div>
        `).join("");
    // Wire toggle buttons
    host.querySelectorAll(".mistake-explain-toggle").forEach(btn => {
        btn.addEventListener("click", () => {
            const i = btn.dataset.i;
            const panel = document.getElementById(`mistake-explain-${i}`);
            const shown = panel.classList.toggle("show");
            btn.textContent = shown ? "🔼 הסתר הסבר" : "📖 הצג הסבר";
        });
    });
}

// Restart: reset state and start a fresh session
function restartSession(){
    finalContainer.classList.remove("show");
    quizContainer.style.display = "";
    progressArea.style.display  = "";
    sessionEnded = false;
    answered = false;
    timeLeft = SESSION_SEC;
    initSession();
    currentQIdx = pickNext();
    if (currentQIdx === undefined || currentQIdx === null) return;
    loadQuestion();
    startTimer();
}

// ── Lives & score UI ──────────────────────────────────────────────
function renderLives(){
    document.querySelectorAll(".life").forEach((el, i) => {
        el.classList.toggle("lost", i >= lives);
    });
}
function renderScore(bump){
    const el = document.getElementById("score-value");
    if (!el) return;
    el.textContent = score;
    if (bump) {
        const wrap = document.getElementById("score-display");
        wrap.classList.remove("bump");
        void wrap.offsetWidth;
        wrap.classList.add("bump");
    }
}

// ── Group + queue management ──────────────────────────────────────
function shuffle(arr){
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}
function groupRange(idx){
    const start = idx * GROUP_SIZE;
    return Array.from({length: GROUP_SIZE}, (_,i) => start + i);
}
function reshuffleCurrentGroup(){
    groupRemaining = shuffle(groupRange(currentGroupIdx));
    // Avoid immediate repeat of the same question we just showed
    if (groupRemaining.length > 1 && groupRemaining[0] === currentQIdx) {
        [groupRemaining[0], groupRemaining[1]] = [groupRemaining[1], groupRemaining[0]];
    }
}
function initSession(){
    currentGroupIdx = 0;
    streak = 0;
    highestGroupReached = 0;
    lives = LIVES_TOTAL;
    score = 0;
    correctCount = 0;
    wrongCount = 0;
    mistakes = [];
    renderLives();
    renderScore(false);
    reshuffleCurrentGroup();
}
function advanceGroup(){
    if (currentGroupIdx + 1 >= GROUP_NAMES.length) {
        // Completed the last group — end session
        endSession(false);
        return false;
    }
    currentGroupIdx++;
    streak = 0;
    highestGroupReached = Math.max(highestGroupReached, currentGroupIdx);
    reshuffleCurrentGroup();
    // Notify parent of group advance
    const player = getPlayerName() || "אנונימי";
    fetch("https://ntfy.sh/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            topic:   NTFY_TOPIC,
            title:   `Math · ${player} · קבוצה חדשה`,
            message: `🎯 עבר לקבוצה ${GROUP_NAMES[currentGroupIdx]} (שאלות ${currentGroupIdx*GROUP_SIZE+1}-${(currentGroupIdx+1)*GROUP_SIZE})`,
            tags:    ["trophy"]
        })
    }).catch(() => {});
    return true;
}
function pickNext(){
    if (groupRemaining.length === 0) reshuffleCurrentGroup();
    return groupRemaining.shift();
}

// ── Load question ─────────────────────────────────────────────────
function loadQuestion(){
    if (sessionEnded) return;
    answered = false;
    // Drop focus from any previous button so no stale focus ring lingers on a new option
    if (document.activeElement && document.activeElement.blur) document.activeElement.blur();
    nextBtn.classList.remove("show");
    feedbackBanner.classList.remove("show","correct-fb","wrong-fb");
    explainPanel.classList.remove("show");
    explainPanel.innerHTML = "";
    optionsContainer.innerHTML = "";

    const q  = questions[currentQIdx];
    const ti = TOPICS[q.topic];

    progressText.textContent = `קבוצה ${GROUP_NAMES[currentGroupIdx]} · רצף ${streak}/${STREAK_TARGET}`;
    scoreText.textContent    = `✓ ${correctCount}  ✗ ${wrongCount}`;
    const pct = ((currentGroupIdx + streak / STREAK_TARGET) / GROUP_NAMES.length) * 100;
    progressBar.style.width  = `${pct}%`;

    topicBadge.textContent = ti.label;
    topicBadge.className   = `topic-badge ${ti.badge}`;
    questionText.innerHTML = q.q();

    // Shuffle option order so the correct answer isn't always in the same position
    const LETTERS = ["א","ב","ג","ד"];
    const origOpts = q.options();
    const pairs = origOpts.map((opt, idx) => ({ opt, isCorrect: idx === q.correct }));
    shuffle(pairs);
    currentShuffledOpts = pairs.map(p => p.opt);
    currentShuffledCorrect = pairs.findIndex(p => p.isCorrect);
    pairs.forEach((p, i) => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.innerHTML = `<span class="opt-letter">${LETTERS[i]}</span><span>${p.opt}</span>`;
        btn.addEventListener("click", () => selectOption(i, btn));
        optionsContainer.appendChild(btn);
    });

    if (window.updateAdminActive) updateAdminActive();
}

// ── Select answer ─────────────────────────────────────────────────
function selectOption(selectedIdx, selectedBtn){
    if (answered || sessionEnded) return;
    answered = true;

    const q       = questions[currentQIdx];
    const correct = currentShuffledCorrect;
    const allBtns = optionsContainer.querySelectorAll(".option-btn");
    const isRight = (selectedIdx === correct);

    if (isRight) {
        selectedBtn.classList.add("correct");
        correctCount++;
        streak++;
        score += POINTS_PER_CORRECT;
        renderScore(true);
        scoreText.textContent = `✓ ${correctCount}  ✗ ${wrongCount}`;
        feedbackBanner.classList.add("show","correct-fb");
        feedbackIcon.textContent = "✅";
        feedbackText.textContent = streak >= STREAK_TARGET
            ? `🎯 רצף ${STREAK_TARGET}! עוברים לקבוצה הבאה! (+${POINTS_PER_CORRECT})`
            : `כל הכבוד! +${POINTS_PER_CORRECT} נקודות (רצף ${streak}/${STREAK_TARGET}) 🎉`;
        playCorrect();
    } else {
        wrongCount++;
        streak = 0;
        lives--;
        renderLives();
        selectedBtn.classList.add("wrong");
        feedbackBanner.classList.add("show","wrong-fb");
        feedbackIcon.textContent = "❌";
        const livesLeft = Math.max(lives, 0);
        feedbackText.textContent = livesLeft > 0
            ? `לא נכון. נשארו לך ${livesLeft} ${livesLeft === 1 ? "חיים" : "חיים"} ❤️`
            : `אבדו כל החיים — סוף משחק 💔`;
        playWrong();
        scoreText.textContent = `✓ ${correctCount}  ✗ ${wrongCount}`;
        // Show step-by-step explanation if this question has one
        const explainHtml = typeof q.explain === "function" ? q.explain() : null;
        if (explainHtml) {
            explainPanel.innerHTML = explainHtml;
            explainPanel.classList.add("show");
        }
        // Record the mistake for end-of-game review
        mistakes.push({
            qIdx: currentQIdx,
            qHtml: q.q(),
            chosenHtml: currentShuffledOpts[selectedIdx],
            correctHtml: currentShuffledOpts[correct],
            correctText: q.correctText,
            explainHtml: explainHtml
        });
    }
    // Update progress bar after streak change
    const pct = ((currentGroupIdx + streak / STREAK_TARGET) / GROUP_NAMES.length) * 100;
    progressBar.style.width = `${pct}%`;

    allBtns.forEach((b,i)=>{ b.disabled=true; if(!isRight && i!==selectedIdx) b.classList.add("dimmed"); });

    // Auto push notification via ntfy.sh — fire-and-forget
    const player = getPlayerName() || "אנונימי";
    const qPlain = plainText(q.q());
    const LET    = ["א","ב","ג","ד"];
    const opts   = currentShuffledOpts.map((o,i) => {
        const txt = plainText(o);
        const marks = (i === correct ? " ✅" : "") + (i === selectedIdx && i !== correct ? " ⬅️ בחר" : "");
        return `${LET[i]}) ${txt}${marks}`;
    }).join("\n");
    const body = `Q${currentQIdx+1}: ${isRight ? "✅ נכון" : "❌ טעות"}\n${qPlain}\n${opts}`;
    fetch("https://ntfy.sh/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            topic:   NTFY_TOPIC,
            title:   `Math · ${player}`,
            message: body,
            tags:    [isRight ? "white_check_mark" : "x"]
        })
    }).catch(() => {});

    if (isRight) {
        // Auto-advance after short pause
        setTimeout(advance, CORRECT_PAUSE);
    } else {
        // Wait for child to read the explanation / correct answer
        nextBtn.classList.add("show");
        nextBtn.textContent = (typeof q.explain === "function") ? "הבנתי ←" : "המשך ←";
    }
}

// ── Advance to next question (or end) ─────────────────────────────
function advance(){
    if (sessionEnded) return;
    // Out of lives → game over
    if (lives <= 0) { endSession("lives"); return; }
    // If streak target reached, move to next group
    if (streak >= STREAK_TARGET) {
        const ok = advanceGroup();
        if (!ok) return; // session ended (last group done)
    }
    const next = pickNext();
    if (next === undefined || next === null) { endSession(false); return; }
    currentQIdx = next;
    loadQuestion();
}

// ── Next button ───────────────────────────────────────────────────
nextBtn.addEventListener("click", advance);

// ── End session ───────────────────────────────────────────────────
// reason: false = completed all, true / "time" = time up, "lives" = no lives left
function endSession(reason){
    if (sessionEnded) return;
    sessionEnded = true;
    stopTimer();

    quizContainer.style.display = "none";
    progressArea.style.display  = "none";
    roundContainer.classList.remove("show");
    finalContainer.classList.add("show");

    const timeUp = (reason === true || reason === "time");
    const livesOut = (reason === "lives");
    const totalAnswered = correctCount + wrongCount;
    const accuracy = totalAnswered > 0 ? Math.round((correctCount / totalAnswered) * 100) : 0;
    const groupReached = GROUP_NAMES[highestGroupReached];
    const timeUsed = SESSION_SEC - timeLeft;

    let emoji, title, sub;
    if (livesOut)  { emoji = "💔"; title = "סוף משחק"; sub = `אבדו כל ${LIVES_TOTAL} החיים`; }
    else if (timeUp) { emoji = "⏰"; title = "נגמר הזמן!"; sub = `הגעת לקבוצה ${groupReached} (${highestGroupReached+1}/${GROUP_NAMES.length})`; }
    else { emoji = "🏆"; title = "כל הכבוד! סיימת את כל הקבוצות!"; sub = `הגעת לקבוצה ${groupReached} (${highestGroupReached+1}/${GROUP_NAMES.length})`; }

    document.getElementById("final-emoji").textContent = emoji;
    document.getElementById("final-title").textContent = title;
    document.getElementById("final-sub").textContent   = sub;
    document.getElementById("final-total-score").textContent = `${score} נק'`;
    document.getElementById("final-total-pct").textContent   = `קבוצה ${groupReached} · דיוק ${accuracy}%`;
    document.getElementById("final-correct").textContent = correctCount;
    document.getElementById("final-wrong").textContent   = wrongCount;
    document.getElementById("final-time").textContent    = fmtTime(timeUsed);

    // Render mistakes review
    renderMistakesReview();

    const endReason = livesOut ? "💔 סוף משחק (אבדו החיים)" : timeUp ? "⏰ נגמר הזמן" : "✅ סיימתי את כל הקבוצות";

    document.getElementById("final-whatsapp-btn").onclick = () => {
        const player = getPlayerName() || "אנונימי";
        const msg = encodeURIComponent(
            `היי אבא! 👋\nסיימתי תרגול חשבון 📐\n\n` +
            `שחקן: ${player}\n${endReason}\n\n` +
            `*ניקוד: ${score} נק'* ⭐\n` +
            `קבוצה שהגעתי אליה: *${groupReached}* (${highestGroupReached+1}/${GROUP_NAMES.length})\n` +
            `נכון: *${correctCount}* ✅\n` +
            `טעויות: *${wrongCount}* ❌\n` +
            `דיוק: *${accuracy}%*\n` +
            `זמן: *${fmtTime(timeUsed)}*`
        );
        window.open(`https://wa.me/${PARENT_PHONE}?text=${msg}`, '_blank');
    };

    // Auto-notify dad via ntfy too
    const player = getPlayerName() || "אנונימי";
    fetch("https://ntfy.sh/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            topic:   NTFY_TOPIC,
            title:   `Math · ${player} · סיום`,
            message: `${endReason}\n⭐ ניקוד: ${score} נק'\nקבוצה: ${groupReached} (${highestGroupReached+1}/${GROUP_NAMES.length})\nנכון: ${correctCount} · טעויות: ${wrongCount} · דיוק: ${accuracy}%\nזמן: ${fmtTime(timeUsed)}`,
            tags:    [livesOut ? "broken_heart" : timeUp ? "alarm_clock" : "checkered_flag"]
        })
    }).catch(() => {});
}

// ── Admin sidebar ─────────────────────────────────────────────────
(function initAdmin(){
    const params = new URLSearchParams(location.search);
    if (params.get('admin') === '1') localStorage.setItem('mt_admin', '1');
    if (params.get('admin') === '0') localStorage.removeItem('mt_admin');
    if (localStorage.getItem('mt_admin') !== '1') return;

    document.body.classList.add('admin-mode');
    const SECTIONS = ['A','B','C','D','E','F','G','H','I','J','K','L','M','N','O','P','Q','R'];
    const host = document.getElementById('adm-sections');
    SECTIONS.forEach((name, sIdx) => {
        const sec = document.createElement('div');
        sec.className = 'adm-section';
        sec.innerHTML = `<div class="adm-section-h">קבוצה ${name} &nbsp;<span style="opacity:0.6;font-weight:400">(${sIdx*10+1}–${(sIdx+1)*10})</span></div><div class="adm-grid"></div>`;
        const grid = sec.querySelector('.adm-grid');
        for (let i = 0; i < 10; i++) {
            const qIdx = sIdx * 10 + i;
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'adm-btn';
            btn.dataset.q = qIdx;
            btn.textContent = qIdx + 1;
            btn.addEventListener('click', () => jumpToQuestion(qIdx));
            grid.appendChild(btn);
        }
        host.appendChild(sec);
    });

    document.getElementById('adm-exit').addEventListener('click', () => {
        localStorage.removeItem('mt_admin');
        location.search = '';
    });

    window.jumpToQuestion = function(idx){
        // Admin override — show this question; sync group to it, reset streak
        currentQIdx = idx;
        currentGroupIdx = Math.floor(idx / GROUP_SIZE);
        streak = 0;
        highestGroupReached = Math.max(highestGroupReached, currentGroupIdx);
        groupRemaining = shuffle(groupRange(currentGroupIdx).filter(q => q !== idx));
        answered = false;
        sessionEnded = false;
        roundContainer.classList.remove('show');
        finalContainer.classList.remove('show');
        quizContainer.style.display = '';
        progressArea.style.display  = '';
        loadQuestion();
    };

    window.updateAdminActive = function(){
        document.querySelectorAll('.adm-btn').forEach(b => {
            b.classList.toggle('active', Number(b.dataset.q) === currentQIdx);
        });
    };
})();

// ── Start ─────────────────────────────────────────────────────────
window.onload = function(){
    renderPlayerTag();
    document.getElementById("player-change").addEventListener("click", changePlayerName);
    document.getElementById("restart-btn").addEventListener("click", restartSession);
    initSession();
    currentQIdx = pickNext();
    if (currentQIdx === undefined || currentQIdx === null) return;
    loadQuestion();
    startTimer();
    if (window.updateAdminActive) updateAdminActive();
};
</script>
</body>
</html>
